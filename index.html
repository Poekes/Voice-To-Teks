<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Text - Transkripsi Suara</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --danger: #EF4444;
            --danger-hover: #DC2626;
            --success: #10B981;
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #A78BFA 0%, #3B82F6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 15px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #recordBtn {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }

        #recordBtn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        #recordBtn.recording {
            background-color: var(--danger);
            box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.39);
            animation: pulse 2s infinite;
        }

        #recordBtn.recording:hover {
            background-color: var(--danger-hover);
        }

        #copyBtn {
            background-color: var(--success);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
            display: none;
        }

        #copyBtn:hover {
            transform: translateY(-2px);
        }

        #clearBtn {
            background-color: #F59E0B;
            color: white;
            box-shadow: 0 4px 14px 0 rgba(245, 158, 11, 0.39);
            display: none;
        }

        #clearBtn:hover {
            background-color: #D97706;
            transform: translateY(-2px);
        }

        #undoBtn {
            background-color: #8B5CF6;
            color: white;
            box-shadow: 0 4px 14px 0 rgba(139, 92, 246, 0.39);
            display: none;
        }

        #undoBtn:hover {
            background-color: #7C3AED;
            transform: translateY(-2px);
        }

        .word {
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
            padding: 0 2px;
            border-radius: 4px;
        }

        .word:hover {
            background-color: var(--danger);
            color: white;
            text-decoration: line-through;
        }

        .interim {
            color: var(--text-muted);
            font-style: italic;
        }

        .result-container {
            background-color: #0B1120;
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border);
            position: relative;
        }

        #resultText {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            outline: none;
        }

        #resultText:empty::before {
            content: 'Hasil transkripsi akan muncul di sini...';
            color: var(--text-muted);
        }
        
        .status {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 15px;
            text-align: center;
            height: 20px;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Micro-interactions */
        button:active {
            transform: translateY(0) !important;
        }
        
        /* Custom scrollbar */
        .result-container::-webkit-scrollbar {
            width: 8px;
        }
        .result-container::-webkit-scrollbar-track {
            background: #0F172A;
            border-radius: 4px;
        }
        .result-container::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        .result-container::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Voice to Text</h1>
            <p>Ubah suara Anda menjadi teks dengan mudah</p>
        </div>

        <div class="controls">
            <button id="recordBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
                <span>Mulai Bicara</span>
            </button>
            <button id="copyBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span id="copyText">Salin Teks</span>
            </button>
            <button id="clearBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                <span>Hapus Teks</span>
            </button>
            <button id="undoBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 7v6h6"></path>
                    <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                </svg>
                <span>Hapus Kata Terakhir</span>
            </button>
        </div>

        <div class="result-container">
            <div id="resultText"></div>
        </div>
        <div class="status" id="statusText">Sistem siap.</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
