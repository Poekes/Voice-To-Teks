<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Text - Transkripsi Suara</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Voice to Text</h1>
            <p>Ubah suara Anda menjadi teks dengan mudah</p>
            <div class="lang-selector">
                <select id="langSelect">
                    <option value="id-ID">Bahasa Indonesia</option>
                    <option value="en-US">English (US)</option>
                    <option value="en-GB">English (UK)</option>
                </select>
            </div>
        </div>

        <div class="controls">
            <button id="recordBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
                <span>Mulai Bicara</span>
            </button>
            <button id="copyBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span id="copyText">Salin Teks</span>
            </button>
            <button id="clearBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                <span>Hapus Teks</span>
            </button>
            <button id="undoBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 7v6h6"></path>
                    <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                </svg>
                <span>Hapus Kata Terakhir</span>
            </button>
        </div>

        <div class="result-container">
            <div id="resultText"></div>
        </div>
        <div class="status" id="statusText">Sistem siap.</div>
    </div>

    <!-- Modal Edit/Hapus Kata -->
    <div id="wordModal" class="modal-backdrop">
        <div class="modal">
            <h3 class="modal-title">Edit atau Hapus Kata</h3>
            <p class="modal-subtitle">Kata terpilih: <strong id="modalSelectedWord"></strong></p>
            
            <div class="modal-edit-section">
                <input type="text" id="modalInput" placeholder="Ketik kata pengganti atau ucapkan...">
                <button id="modalMicBtn" class="icon-btn" title="Rekam Suara">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
            </div>
            
            <div class="modal-actions">
                <button id="modalDeleteBtn" class="btn-danger">Hapus</button>
                <div class="modal-actions-right">
                    <button id="modalCancelBtn" class="btn-secondary">Batal</button>
                    <button id="modalConfirmBtn" class="btn-primary">Konfirmasi</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
